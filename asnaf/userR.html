<html>
<html lang="en">
<head>
    <title>User Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#173845;
            height:100vh;
        }

        /* NAVBAR */

        .navbar{
            width:100%;
            height:70px;
            background:#000;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 20px;
        }

        .logo{
            color:red;
            font-size:28px;
            font-weight:bold;
        }

        .menu a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:12px;
        }

        /* MAIN */

        .main{
            height:calc(100vh - 70px);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* REGISTER BOX */

        .register-box{
            width:340px;
            background:#ddd;
            border-radius:30px;
            padding:35px;
        }

        .register-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#000;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:none;
            border-bottom:1px solid #777;
            background:transparent;
            outline:none;
            font-size:13px;
        }

        /* BUTTON */

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:20px;
            background:#22d8ff;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover{
            background:#12c3e8;
        }

        /* LOGIN LINK */

        .login-link{
            text-align:center;
            margin-top:10px;
        }

        .login-link a{
            color:#22d8ff;
            text-decoration:none;
            font-size:12px;
        }

    </style>

</head>
<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">EDL</div>


    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="register-box">

            <h2>Register</h2>

            <form action="userR.php" method="POST" onsubmit="return validateForm()">

                <div class="input-group">
                    <input type="text" id="name" name="name" placeholder="Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="text" id="area" name="area" placeholder="Area" required>
                </div>

                <div class="input-group">
                    <input type="text" id="account" name="account" placeholder="Account Number (CEB)" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Create Password" required>
                </div>

                <button class="btn" name="create">
                    Create
                </button>

            </form>

            <div class="login-link">

                <a href="userL.html">
                    Click Login
                </a>

            </div>

        </div>

    </div>

    <!-- JAVASCRIPT -->

    <script>

        function validateForm(){

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let area = document.getElementById("area").value;
            let account = document.getElementById("account").value;
            let password = document.getElementById("password").value;

            // EMPTY CHECK

            if(name == "" || email == "" || area == "" || account == "" || password == ""){
                alert("All Fields Must Be Filled");
                return false;
            }

            // EMAIL CHECK

            if(!email.includes("@")){
                alert("Enter Valid Email");
                return false;
            }

            // ACCOUNT NUMBER CHECK

            if(isNaN(account)){
                alert("Account Number Must Be Number");
                return false;
            }

            // PASSWORD LENGTH

            if(password.length < 6){
                alert("Password Must Be Minimum 6 Characters");
                return false;
            }

            return true;

        }

    </script>

</body>
</html>
