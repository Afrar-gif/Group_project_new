<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#173845;
            height:100vh;
        }

        

        .navbar{
            width:100%;
            height:70px;
            background:#000;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 20px;
        }

        .logo{
            color:red;
            font-size:28px;
            font-weight:bold;
        }

        .menu a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:12px;
        }

        

        .main{
            height:calc(100vh - 70px);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        

        .login-box{
            width:340px;
            background:#ddd;
            border-radius:30px;
            padding:40px 35px;
            animation:fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(-10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#000;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:none;
            border-bottom:1px solid #777;
            background:transparent;
            outline:none;
            font-size:14px;
        }

       

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:20px;
            background:#22d8ff;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        .btn:hover{
            background:#12c3e8;
            transform:scale(1.02);
        }

       

        .register-link{
            text-align:center;
            margin-top:15px;
        }

        .register-link a{
            color:#22d8ff;
            text-decoration:none;
            font-size:12px;
        }

    </style>

</head>

<body>

    

    <div class="navbar">

        <div class="logo">EDL</div>


    </div>

    

    <div class="main">

        <div class="login-box">

            <h2>Admin Login</h2>

            <form action="adminL.php"
                  method="POST"
                  onsubmit="return validateAdminLogin()">

                <div class="input-group">

                    <input type="text"
                           id="secretkey"
                           name="secretkey"
                           placeholder="Security Key"
                           required>

                </div>

                <div class="input-group">

                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Password"
                           required>

                </div>

                <button type="submit" class="btn">

                    Login

                </button>

            </form>

            <div class="register-link">

                <a href="adminR.html">

                    Don't have an account? Register

                </a>

            </div>

        </div>

    </div>

    

    <script>

        function validateAdminLogin(){

            let secretkey =
            document.getElementById("secretkey").value.trim();

            let password =
            document.getElementById("password").value.trim();

           

            if(secretkey === "" || password === ""){

                alert("All Fields Must Be Filled");
                return false;

            }

            

            if(password.length < 6){

                alert("Password Must Be Minimum 6 Characters");
                return false;

            }

            return true;

        }

    </script>

</body>

</html>
